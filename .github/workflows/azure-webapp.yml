name: Deploy Dash app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: visual
  PYTHON_VERSION: "3.12"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build deployment package
        run: |
          python -m pip install --upgrade pip
          rm -rf deploy
          mkdir -p deploy
          cp -R app assets processed deploy/
          cp requirements.txt startup.sh deploy/
          pip install --no-cache-dir --target="deploy/.python_packages/lib/site-packages" -r requirements.txt

      - name: Check Azure publish profile secret
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "Missing GitHub secret: AZURE_WEBAPP_PUBLISH_PROFILE"
            echo "Add it in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
